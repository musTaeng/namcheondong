<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>익하이브</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1><a href="/">익하이브</a></h1>
        <nav>
            <ul>
                <li><a href="#">자유게시판</a></li>
                <li><a href="#">익현이지도</a></li>
                <li><a href="#">자료실</a></li>
                <li><a href="#">미래대통령</a></li>
                <li><a href="#">헬마우스</a></li>
                <li><a href="#">묘장군</a></li>
                <li><a href="#">거없</a></li>
            </ul>
            <button id="theme-toggle" aria-label="Toggle dark mode">
                <span class="icon">🌙</span>
            </button>
        </nav>
    </header>
    <main>
      <section id="contact">
        <h2>제휴 문의</h2>
        <p>익하이브와 함께 성장할 파트너를 찾습니다. 아래 양식을 작성해 주세요.</p>
        
        <form id="contact-form" action="https://formspree.io/f/your-form-id" method="POST">
          <div class="form-group">
            <label for="name">이름/기업명</label>
            <input type="text" id="name" name="name" required placeholder="홍길동">
          </div>
          
          <div class="form-group">
            <label for="email">이메일 주소</label>
            <input type="email" id="email" name="email" required placeholder="example@email.com">
          </div>
          
          <div class="form-group">
            <label for="message">문의 내용</label>
            <textarea id="message" name="message" required placeholder="제휴 제안 내용을 상세히 입력해 주세요."></textarea>
          </div>
          
          <button type="submit" class="submit-btn">문의하기</button>
        </form>
      </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
